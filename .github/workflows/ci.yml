name: CI/CD Pipeline

on:
  push:
    branches: [main, develop, "feature/**"]
  pull_request:
    branches: [main, develop]

jobs:

############################################
##### TEST
###########################################
  # Teste chaque service en parallele avec RabbitMQ disponible
  # MongoDB est mocke dans les tests (pas de vraie BDD)
  test:
    name: Tests - ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [auth, product, order, api-gateway]

    services:
      rabbitmq:
        image: rabbitmq:3.8-management-alpine
        ports: ["5672:5672"]
        options: --health-cmd "rabbitmq-diagnostics -q ping" --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ${{ matrix.service }}/package-lock.json
      - run: npm ci
        working-directory: ${{ matrix.service }}
      - run: npm test -- --coverage --coverageReporters=lcov --forceExit --detectOpenHandles
        working-directory: ${{ matrix.service }}
        env:
          NODE_ENV: test
          RABBITMQ_URL: amqp://localhost:5672
          JWT_SECRET: ci-secret
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-${{ matrix.service }}
          path: ${{ matrix.service }}/coverage/lcov.info

#####################################################
############# SCAN SONARQUBE 
#####################################################

  # Analyse la qualite du code sur SonarCloud
  sonarqube:
    name: SonarCloud
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          pattern: coverage-*
          path: ./coverage-reports
      - uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

#########################################################
########## BUILD & PUSH 
#########################################################
  # Build et pousse les images Docker sur GHCR
  build-and-push:
    name: Docker - ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    strategy:
      fail-fast: false
      matrix:
        service: [auth, product, order, api-gateway]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.service }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
      - uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

##########################################################
######### DEPLOY 
##########################################################
  # Se connecte a l'instance EC2 AWS et relance la stack via docker compose
  deploy:
    name: Deploy to AWS EC2
    runs-on: ubuntu-latest
    needs: [sonarqube, build-and-push]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AWS_EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.AWS_EC2_IP }} >> ~/.ssh/known_hosts
      - name: Deploy via SSH
        run: |
          ssh ec2-user@${{ secrets.AWS_EC2_IP }} "
            cd ~/app &&
            docker compose pull &&
            docker compose up -d
          "